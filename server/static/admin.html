<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum Lynskarp — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple: #4D1D82;
      --purple-light: #8C1D82;
      --purple-bg: #1a0830;
      --purple-dark: #1a0830;
      --red: #CF022B;
      --orange: #F07D00;
      --grey: #a7a7a6;
      --green: #539227;
      --pink: #EA5599;

      --bg: var(--purple-dark);
      --surface: rgba(255, 255, 255, 0.08);
      --surface-solid: rgba(255, 255, 255, 0.12);
      --border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --muted: rgba(255, 255, 255, 0.5);
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 55% 50%, rgba(140, 29, 130, 0.3) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 30%, rgba(200, 80, 180, 0.2) 0%, transparent 60%);
      color: var(--text);
      font-family: "DM Sans", system-ui, -apple-system, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
    }

    header {
      background: rgba(77, 29, 130, 0.6);
      backdrop-filter: blur(12px);
      padding: 0 1.25rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }

    .header-left { display: flex; align-items: center; gap: 0.75rem; }

    .header-title {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.05em;
    }
    .header-title span { color: rgba(255,255,255,0.5); font-weight: 400; }

    .back-btn {
      display: none;
      align-items: center;
      gap: 0.35rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.85);
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius);
      transition: background 0.15s;
      min-height: 40px;
    }
    .back-btn:hover { background: rgba(255,255,255,0.15); }
    .back-btn:active { transform: translateY(1px); }
    .back-btn .chevron-back {
      display: inline-block;
      width: 0.5em; height: 0.5em;
      border-left: 2.5px solid currentColor;
      border-bottom: 2.5px solid currentColor;
      transform: rotate(45deg);
      margin-right: 0.15em;
    }

    main { max-width: 600px; margin: 0 auto; padding: 1.25rem; }
    main.wide { max-width: 1100px; }

    /* Dashboard cards */
    .dashboard { display: flex; flex-direction: column; gap: 1rem; margin-top: 0.5rem; }

    .dash-card {
      background: var(--surface);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: background 0.15s, transform 0.08s;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .dash-card:hover { background: var(--surface-solid); }
    .dash-card:active { transform: translateY(2px); }
    .dash-card-body { flex: 1; min-width: 0; }
    .dash-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.2rem; color: #fff; }
    .dash-card p { color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 0.5rem; }
    .dash-card .card-stat { font-size: 1.75rem; font-weight: 700; color: var(--pink); line-height: 1; }
    .dash-card .card-stat-label { color: var(--muted); font-size: 0.75rem; }
    .dash-card .card-chevron {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; flex-shrink: 0; color: var(--text-secondary);
    }
    .card-chevron svg { width: 20px; height: 20px; }

    /* Sections */
    .section { display: none; }
    .section.active { display: block; }

    .section-title { font-size: 1.2rem; font-weight: 700; color: #fff; margin-bottom: 1rem; }

    /* Shared */
    .toolbar { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .toolbar input[type="search"] {
      background: var(--surface); border: 1px solid var(--border);
      color: #fff; border-radius: var(--radius); padding: 0.6rem 0.75rem;
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 0.85rem; outline: none; flex: 1; min-width: 0;
      backdrop-filter: blur(8px);
    }
    .toolbar input[type="search"]::placeholder { color: var(--muted); }
    .toolbar input[type="search"]:focus { border-color: var(--pink); }
    .toolbar-spacer { flex: 1; }

    .btn {
      border: none; border-radius: var(--radius); padding: 0.55rem 1rem;
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
      transition: transform 0.08s, filter 0.15s;
      min-height: 40px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn:active:not(:disabled) { transform: translateY(2px); }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-purple { background: var(--purple); color: #fff; }
    .btn-red    { background: var(--red); color: #fff; }
    .btn-ghost  { background: var(--surface); color: #fff; border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface-solid); }
    .btn-orange { background: var(--orange); color: #fff; }
    .btn-sm { padding: 0.35rem 0.6rem; font-size: 0.75rem; min-height: 32px; }

    .table-wrap {
      overflow-x: auto; border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow);
    }
    table { width: 100%; border-collapse: collapse; background: var(--surface); backdrop-filter: blur(8px); }
    th {
      background: rgba(255,255,255,0.05); color: var(--text-secondary); font-size: 0.7rem;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      padding: 0.65rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border);
    }
    td {
      padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border);
      vertical-align: middle; font-size: 0.85rem; color: var(--text-secondary);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.03); }

    .badge {
      display: inline-block; padding: 0.2rem 0.55rem; border-radius: 6px;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em;
    }
    .badge-green { background: rgba(83,146,39,0.2); color: #7cc948; }
    .badge-muted { background: rgba(255,255,255,0.08); color: var(--muted); }
    .action-row { display: flex; gap: 0.35rem; align-items: center; flex-wrap: wrap; }

    /* Modal */
    .modal-backdrop {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 200; align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #2a1450; border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem; width: 380px; max-width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .modal h3 { margin-bottom: 1.25rem; font-size: 1rem; font-weight: 700; color: #fff; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 0.4rem; font-weight: 600; }
    .field input, .field select {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      color: #fff; border-radius: var(--radius); padding: 0.6rem 0.75rem;
      font-family: "DM Sans", system-ui, sans-serif; font-size: 0.9rem; outline: none;
    }
    .field input:focus, .field select:focus { border-color: var(--pink); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem; }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }

    /* Booth cards */
    .booth-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .booth-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1rem; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
      backdrop-filter: blur(8px);
    }
    .booth-card strong { min-width: 70px; font-size: 0.9rem; color: #fff; }
    .booth-card .url-text {
      color: var(--pink); font-family: monospace; font-size: 0.75rem;
      background: var(--surface); padding: 0.3rem 0.5rem; border-radius: 6px; cursor: pointer;
      word-break: break-all; border: 1px solid var(--border);
    }
    .booth-card .url-text:active { background: var(--surface-solid); }
    .booth-card select {
      background: var(--surface); border: 1px solid var(--border); color: #fff;
      border-radius: var(--radius); padding: 0.4rem 0.5rem; font-size: 0.8rem;
      font-family: "DM Sans", system-ui, sans-serif; min-height: 36px;
    }

    /* Add user form */
    .inline-form { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .inline-form input {
      background: var(--surface); border: 1px solid var(--border); color: #fff;
      border-radius: var(--radius); padding: 0.55rem 0.75rem; font-size: 0.85rem; outline: none;
      font-family: "DM Sans", system-ui, sans-serif; min-height: 40px;
    }
    .inline-form input::placeholder { color: var(--muted); }
    .inline-form input:focus { border-color: var(--pink); }

    @media (max-width: 480px) {
      .inline-form { flex-direction: column; align-items: stretch; }
      .inline-form input { width: 100% !important; }
      .action-row { gap: 0.25rem; }
      .btn-sm { padding: 0.3rem 0.45rem; font-size: 0.7rem; }
      .booth-card { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <button class="back-btn" id="back-btn" onclick="showDashboard()"><span class="chevron-back"></span> Back</button>
    <div class="header-title">MOMENTUM LYNSKARP <span>/ Admin</span></div>
  </div>
  <div id="header-right"></div>
</header>

<main>
  <!-- Dashboard -->
  <div id="view-dashboard">
    <div class="dashboard">
      <div class="dash-card" onclick="showSection('users')">
        <div class="dash-card-body">
          <h3>Users</h3>
          <p>Manage attendees & registrations</p>
          <div class="card-stat" id="stat-users">—</div>
          <span class="card-stat-label">users</span>
        </div>
        <div class="card-chevron">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
      </div>
      <div class="dash-card" onclick="showSection('booths')">
        <div class="dash-card-body">
          <h3>Booths</h3>
          <p>Configure iPads & flows</p>
          <div class="card-stat" id="stat-booths">—</div>
          <span class="card-stat-label">booths</span>
        </div>
        <div class="card-chevron">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
      </div>
    </div>
  </div>

  <!-- Users section -->
  <div id="view-users" class="section">
    <div class="toolbar">
      <input type="search" id="user-search" placeholder="Search name…" oninput="renderUserTable()" />
      <button class="btn btn-ghost" onclick="loadUsers()">↺ Refresh</button>
      <div class="toolbar-spacer"></div>
      <label class="btn btn-ghost" style="cursor:pointer">
        📁 Import XLSX/CSV
        <input type="file" id="import-file" accept=".csv,.xlsx" onchange="importFile()" style="display:none" />
      </label>
      <a class="btn btn-purple" href="/admin/api/export-interests" download="interessefordeling.xlsx">📊 Eksporter interesser</a>
      <a class="btn btn-purple" href="/admin/api/export-users" download="brukeroversikt.xlsx">📋 Eksporter brukere</a>
    </div>
    <div class="inline-form" style="margin-bottom:1rem">
      <input type="text" id="add-name" placeholder="Name" style="width:180px" />
      <input type="email" id="add-email" placeholder="Email" style="width:220px" />
      <button class="btn btn-purple btn-sm" onclick="addUser()">+ Add User</button>
      <div class="toolbar-spacer"></div>
      <button class="btn btn-orange btn-sm" onclick="clearAllRegistrations()">Clear all interests &amp; demos</button>
      <button class="btn btn-red btn-sm" onclick="deleteAllUsers()">Delete all users</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Interest</th>
            <th>Label</th>
            <th>Demo</th>
            <th style="width:160px">Actions</th>
          </tr>
        </thead>
        <tbody id="user-tbody"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Booths section -->
  <div id="view-booths" class="section">
    <div class="toolbar">
      <button class="btn btn-purple" onclick="addBooth()">+ Add Booth</button>
      <button class="btn btn-ghost" onclick="loadBooths()">↺ Refresh</button>
    </div>
    <div class="booth-list" id="booth-list"></div>
  </div>

  <!-- Presentations section -->
  <div id="view-presentations" class="section">
    <div class="inline-form" style="margin-bottom:1rem">
      <input type="text" id="add-pres-name" placeholder="Presentation name" style="flex:1;min-width:0" />
      <button class="btn btn-purple" onclick="addPresentation()">+ Add</button>
    </div>
    <div class="booth-list" id="pres-list"></div>
  </div>
</main>

<!-- Edit modal (presentations) -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h3 id="modal-title">Edit</h3>
    <div class="field">
      <label>Name</label>
      <input type="text" id="edit-name" maxlength="60" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-purple" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Interest edit modal -->
<div class="modal-backdrop" id="interest-modal">
  <div class="modal" style="width:440px">
    <h3>Rediger interesser</h3>
    <p style="font-size:0.8rem;color:var(--grey);margin-bottom:1rem">Velg 1–3 interesser</p>
    <div id="interest-checkboxes" style="display:flex;flex-direction:column;gap:0.5rem;max-height:400px;overflow-y:auto"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeInterestModal()">Avbryt</button>
      <button class="btn btn-purple" onclick="saveInterest()">Lagre</button>
    </div>
  </div>
</div>

<script>
  const ALL_INTERESTS = [
    'Periodeavslutning',
    'Avsetninger og periodiseringer',
    'Interntransaksjoner',
    'Kostnader og varelager',
    'Budsjett og prognose',
    'Konsolidering',
    'Effektivisering av økonomifunksjonen',
    'Rapportering',
    'Lønnsomhet ved bruk av KI',
    'Praktisk bruk av KI',
  ]

  let mergedUsers = []
  let boothList = []
  let presList = []
  let editingPresId = null
  let currentSection = null

  // ── Navigation ────────────────────────────────────────────

  function showDashboard() {
    currentSection = null
    document.getElementById('view-dashboard').style.display = ''
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'))
    document.getElementById('back-btn').style.display = 'none'
    document.querySelector('main').classList.remove('wide')
    refreshDashboardStats()
  }

  function showSection(name) {
    currentSection = name
    document.getElementById('view-dashboard').style.display = 'none'
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'))
    document.getElementById(`view-${name}`).classList.add('active')
    document.getElementById('back-btn').style.display = 'flex'
    // Sections with tables get more room on wider screens
    const wideViews = ['users']
    document.querySelector('main').classList.toggle('wide', wideViews.includes(name))

    if (name === 'users') loadUsers()
    if (name === 'booths') loadBooths()
    if (name === 'presentations') loadPresentations()
  }

  async function refreshDashboardStats() {
    try {
      const [userRes, boothRes, presRes] = await Promise.all([
        fetch('/admin/api/users'),
        fetch('/admin/api/booths'),
        fetch('/admin/api/presentations'),
      ])
      if (userRes.ok) {
        mergedUsers = await userRes.json()
        document.getElementById('stat-users').textContent = mergedUsers.length
      }
      if (boothRes.ok) {
        boothList = await boothRes.json()
        document.getElementById('stat-booths').textContent = boothList.length
      }
      if (presRes.ok) {
        presList = await presRes.json()
        document.getElementById('stat-presentations').textContent = presList.length
      }
    } catch (e) {}
  }

  function closeModal() {
    editingPresId = null
    document.getElementById('modal').classList.remove('open')
  }

  async function saveEdit() {
    const name = document.getElementById('edit-name').value.trim()

    if (editingPresId) {
      const res = await fetch(`/admin/api/presentations/${editingPresId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name }),
      })
      if (res.ok) {
        const updated = presList.find(p => p.id === editingPresId)
        if (updated) updated.name = name
        closeModal()
        renderPresentations()
      } else alert('Save failed')
    }
  }

  // ── Users section ─────────────────────────────────────────

  async function loadUsers() {
    try {
      const res = await fetch('/admin/api/users')
      if (res.status === 401) { location.reload(); return }
      mergedUsers = await res.json()
      renderUserTable()
    } catch (e) {
      document.getElementById('user-tbody').innerHTML =
        '<tr><td colspan="6" class="empty">Failed to load</td></tr>'
    }
  }

  function renderUserTable() {
    const q = document.getElementById('user-search').value.toLowerCase()
    const tbody = document.getElementById('user-tbody')
    const rows = mergedUsers.filter(u => !q || (u.name || '').toLowerCase().includes(q))

    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">No users found</td></tr>'
      return
    }
    tbody.innerHTML = rows.map(u => {
      const printed = u.label_printed === true
      const queued = u.label_printed === false && u.interest
      const labelStatus = printed ? '<span class="badge badge-green">Printed</span>'
        : queued ? '<span class="badge" style="background:rgba(240,125,0,0.15);color:var(--orange)">Queued</span>'
        : '<span class="badge badge-muted">—</span>'
      return `
      <tr>
        <td>${esc(u.name)}</td>
        <td style="color:var(--muted)">${esc(u.email)}</td>
        <td style="color:var(--muted)">
          ${esc(u.interest || '—')}
          <button class="btn btn-ghost btn-sm" style="margin-left:0.25rem;padding:0.3rem 0.5rem" onclick="editInterest('${u.id}')">✎</button>
        </td>
        <td>${labelStatus}</td>
        <td>
          <button class="btn ${u.wants_demo ? 'btn-purple' : 'btn-ghost'} btn-sm" onclick="toggleDemo('${u.id}', ${!u.wants_demo})">
            ${u.wants_demo ? 'Yes' : 'No'}
          </button>
        </td>
        <td>
          <div class="action-row">
            ${printed ? `<button class="btn btn-ghost btn-sm" onclick="reprintLabel('${u.id}')">Reprint</button>` : ''}
            ${u.interest ? `<button class="btn btn-orange btn-sm" onclick="clearInterest('${u.id}')">Clear</button>` : ''}
            <button class="btn btn-red btn-sm" onclick="deleteUser('${u.id}')">Delete</button>
          </div>
        </td>
      </tr>`
    }).join('')
  }

  async function clearAllRegistrations() {
    if (!confirm('Clear ALL interests and demo flags for every user? This cannot be undone.')) return
    const res = await fetch('/admin/api/clear-registrations', { method: 'POST' })
    if (res.ok) {
      const data = await res.json()
      alert(`Cleared registrations for ${data.cleared} users`)
      loadUsers()
    } else alert('Failed to clear registrations')
  }

  async function deleteAllUsers() {
    if (!confirm('DELETE ALL USERS? This cannot be undone!')) return
    if (!confirm('Are you really sure? All user data will be permanently deleted.')) return
    const res = await fetch('/admin/api/delete-all-users', { method: 'POST' })
    if (res.ok) {
      const data = await res.json()
      alert(`Deleted ${data.deleted} users`)
      loadUsers()
    } else alert('Failed to delete users')
  }

  let editingInterestUserId = null

  function editInterest(id) {
    const user = mergedUsers.find(u => u.id === id)
    if (!user) return
    editingInterestUserId = id
    const current = (user.interest || '').split(',').map(s => s.trim()).filter(Boolean)
    const container = document.getElementById('interest-checkboxes')
    container.innerHTML = ALL_INTERESTS.map(interest => {
      const checked = current.includes(interest) ? 'checked' : ''
      return `<label style="display:flex;align-items:center;gap:0.5rem;padding:0.4rem 0.5rem;cursor:pointer;border-radius:4px;background:${checked ? 'rgba(60,28,113,0.08)' : 'transparent'}">
        <input type="checkbox" value="${esc(interest)}" ${checked} onchange="updateInterestCheckbox()" style="width:18px;height:18px;accent-color:var(--purple)" />
        <span style="font-size:0.9rem">${esc(interest)}</span>
      </label>`
    }).join('')
    document.getElementById('interest-modal').classList.add('open')
  }

  function updateInterestCheckbox() {
    const checks = document.querySelectorAll('#interest-checkboxes input[type=checkbox]')
    const selected = [...checks].filter(c => c.checked)
    if (selected.length > 3) {
      // uncheck the last one clicked
      event.target.checked = false
    }
    // Update backgrounds
    checks.forEach(c => {
      c.parentElement.style.background = c.checked ? 'rgba(60,28,113,0.08)' : 'transparent'
    })
  }

  function closeInterestModal() {
    editingInterestUserId = null
    document.getElementById('interest-modal').classList.remove('open')
  }

  async function saveInterest() {
    if (!editingInterestUserId) return
    const checks = document.querySelectorAll('#interest-checkboxes input[type=checkbox]:checked')
    const selected = [...checks].map(c => c.value)
    if (selected.length < 1) { alert('Velg minst 1 interesse'); return }
    const res = await fetch(`/admin/api/users/${editingInterestUserId}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ interest: selected.join(', ') }),
    })
    if (res.ok) {
      closeInterestModal()
      loadUsers()
    } else alert('Failed to update interest')
  }

  async function reprintLabel(id) {
    const res = await fetch(`/admin/api/users/${id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reprint: true }),
    })
    if (res.ok) loadUsers()
    else alert('Failed to queue reprint')
  }

  async function clearInterest(id) {
    if (!confirm('Clear interest for this user? They will need to re-register.')) return
    const res = await fetch(`/admin/api/users/${id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ clear_interest: true }),
    })
    if (res.ok) loadUsers()
    else alert('Failed to clear interest')
  }

  async function toggleDemo(id, value) {
    const res = await fetch(`/admin/api/users/${id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ wants_demo: value }),
    })
    if (res.ok) loadUsers()
    else alert('Failed to update demo status')
  }

  async function deleteUser(id) {
    if (!confirm('Delete this user?')) return
    const res = await fetch(`/admin/api/users/${id}`, { method: 'DELETE' })
    if (res.ok) loadUsers()
    else alert('Delete failed')
  }

  async function addUser() {
    const name = document.getElementById('add-name').value.trim()
    const email = document.getElementById('add-email').value.trim()
    if (!name || !email) { alert('Name and email required'); return }
    try {
      const res = await fetch('/admin/api/users', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email }),
      })
      if (res.status === 409) { alert('Email already exists'); return }
      if (res.ok) {
        document.getElementById('add-name').value = ''
        document.getElementById('add-email').value = ''
        loadUsers()
      }
    } catch (e) { alert('Failed to add user') }
  }

  async function importFile() {
    const input = document.getElementById('import-file')
    const file = input.files[0]
    if (!file) return
    const fd = new FormData()
    fd.append('file', file)
    try {
      const res = await fetch('/admin/api/import-users', { method: 'POST', body: fd })
      if (res.status === 401) { location.reload(); return }
      const data = await res.json()
      alert(`Imported ${data.imported} users, skipped ${data.skipped}. Total: ${data.total}`)
      loadUsers()
    } catch (e) { alert('Import failed: ' + e.message) }
    input.value = ''
  }

  // ── Booths section ────────────────────────────────────────

  async function loadBooths() {
    try {
      const res = await fetch('/admin/api/booths')
      if (res.status === 401) { location.reload(); return }
      boothList = await res.json()
      renderBooths()
    } catch (e) {
      document.getElementById('booth-list').innerHTML = '<p class="empty">Failed to load</p>'
    }
  }

  function renderBooths() {
    const container = document.getElementById('booth-list')
    if (!boothList.length) {
      container.innerHTML = '<p class="empty">No booths configured</p>'
      return
    }
    const host = window.location.origin
    container.innerHTML = boothList.map(b => `
      <div class="booth-card">
        <strong>${esc(b.name)}</strong>
        <span class="url-text" onclick="copyUrl('${host}/booth/${b.number}')" title="Click to copy">${host}/booth/${b.number}</span>
        <select onchange="updateBoothMode('${b.id}', this.value)">
          <option value="both" ${b.mode === 'both' ? 'selected' : ''}>Both</option>
          <option value="register" ${b.mode === 'register' ? 'selected' : ''}>Register only</option>
          <option value="demo" ${b.mode === 'demo' ? 'selected' : ''}>Demo only</option>
        </select>
        <div class="toolbar-spacer"></div>
        <button class="btn btn-red btn-sm" onclick="deleteBooth('${b.id}')">Delete</button>
      </div>
    `).join('')
  }

  async function addBooth() {
    const res = await fetch('/admin/api/booths', { method: 'POST' })
    if (res.ok) loadBooths()
  }

  async function updateBoothMode(id, mode) {
    await fetch(`/admin/api/booths/${id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode }),
    })
  }

  async function deleteBooth(id) {
    if (!confirm('Delete this booth?')) return
    const res = await fetch(`/admin/api/booths/${id}`, { method: 'DELETE' })
    if (res.ok) loadBooths()
  }

  function copyUrl(url) {
    navigator.clipboard.writeText(url).then(() => {
      // Brief visual feedback — could enhance later
      alert('Copied: ' + url)
    })
  }

  // ── Presentations section ────────────────────────────────

  async function loadPresentations() {
    try {
      const res = await fetch('/admin/api/presentations')
      if (res.status === 401) { location.reload(); return }
      presList = await res.json()
      renderPresentations()
    } catch (e) {
      document.getElementById('pres-list').innerHTML = '<p class="empty">Failed to load</p>'
    }
  }

  function renderPresentations() {
    const container = document.getElementById('pres-list')
    if (!presList.length) {
      container.innerHTML = '<p class="empty">No presentations added yet</p>'
      return
    }
    container.innerHTML = presList.map(p => `
      <div class="booth-card">
        <strong style="flex:1;min-width:0">${esc(p.name)}</strong>
        <button class="btn btn-ghost btn-sm" onclick="editPresentation('${p.id}')">Edit</button>
        <button class="btn btn-red btn-sm" onclick="deletePresentation('${p.id}')">Delete</button>
      </div>
    `).join('')
  }

  async function addPresentation() {
    const input = document.getElementById('add-pres-name')
    const name = input.value.trim()
    if (!name) return
    try {
      const res = await fetch('/admin/api/presentations', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name }),
      })
      if (res.ok) { input.value = ''; loadPresentations() }
    } catch (e) { alert('Failed to add presentation') }
  }

  function editPresentation(id) {
    const pres = presList.find(p => p.id === id)
    if (!pres) return
    editingPresId = id
    document.getElementById('modal-title').textContent = 'Edit presentation'
    document.getElementById('edit-name').value = pres.name || ''
    document.getElementById('modal').classList.add('open')
    document.getElementById('edit-name').focus()
  }

  async function deletePresentation(id) {
    const pres = presList.find(p => p.id === id)
    if (!confirm(`Delete "${pres?.name || 'this presentation'}"?`)) return
    const res = await fetch(`/admin/api/presentations/${id}`, { method: 'DELETE' })
    if (res.ok) loadPresentations()
    else alert('Delete failed')
  }

  // ── Helpers ───────────────────────────────────────────────

  function esc(s) {
    if (!s) return ''
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }
  function fmtDate(ts) {
    if (!ts) return '—'
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
  }

  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal()
  })
  document.getElementById('interest-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeInterestModal()
  })
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeInterestModal() }
  })

  // ── Init ──────────────────────────────────────────────────

  refreshDashboardStats()
</script>
</body>
</html>
